<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jizo - Japan Life Navigator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
    }

    /* === LAYOUT === */
    .app {
      display: grid;
      grid-template-columns: 420px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1.5rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    header h1 {
      font-size: 1.3rem;
      background: linear-gradient(135deg, #e11d48, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-right { display: flex; align-items: center; gap: .75rem; }
    #status { font-size: .8rem; color: #64748b; }
    #status.connected { color: #22c55e; }
    #status.connecting { color: #f59e0b; }
    #status.error { color: #ef4444; }

    /* === LEFT PANEL: CHECKLIST === */
    .checklist-panel {
      border-right: 1px solid #334155;
      overflow-y: auto;
      padding: 1rem;
    }
    .progress-bar {
      background: #1e293b;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid #334155;
    }
    .progress-bar .label { font-size: .75rem; color: #94a3b8; margin-bottom: .4rem; }
    .progress-track {
      background: #334155;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #e11d48, #f97316);
      height: 100%;
      border-radius: 999px;
      transition: width .4s ease;
      min-width: 0;
    }
    .progress-text { font-size: .75rem; color: #64748b; margin-top: .3rem; text-align: right; }

    /* Step cards */
    .step-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      margin-bottom: .75rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .step-card.active {
      border-color: #f97316;
      box-shadow: 0 0 12px rgba(249,115,22,.12);
    }
    .step-card.completed {
      border-color: #22c55e;
      opacity: .85;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      cursor: pointer;
      user-select: none;
      border-radius: 12px;
    }
    .step-header:hover { background: #252f3f; }

    .step-number {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700;
      background: #334155; color: #94a3b8;
      flex-shrink: 0;
      transition: all .2s;
    }
    .step-card.active .step-number { background: #f97316; color: white; }
    .step-card.completed .step-number { background: #22c55e; color: white; }

    .step-info { flex: 1; min-width: 0; }
    .step-title { font-size: .9rem; font-weight: 600; }
    .step-card.completed .step-title { text-decoration: line-through; color: #64748b; }
    .step-deadline {
      font-size: .7rem;
      color: #f59e0b;
      margin-top: .15rem;
    }

    .step-check {
      width: 24px; height: 24px;
      border-radius: 6px;
      border: 2px solid #475569;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .15s;
      font-size: .75rem;
    }
    .step-check:hover { border-color: #22c55e; background: rgba(34,197,94,.1); }
    .step-card.completed .step-check {
      background: #22c55e; border-color: #22c55e; color: white;
    }

    /* Expanded step detail */
    .step-detail {
      display: none;
      padding: 0 1rem 1rem 1rem;
      border-top: 1px solid #2d3748;
    }
    .step-card.expanded .step-detail { display: block; }

    .detail-section {
      margin-top: .75rem;
    }
    .detail-section h4 {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #f97316;
      margin-bottom: .4rem;
    }
    .detail-section ul {
      list-style: none;
      padding: 0;
    }
    .detail-section li {
      font-size: .82rem;
      color: #cbd5e1;
      padding: .2rem 0;
      padding-left: 1rem;
      position: relative;
      line-height: 1.35;
    }
    .detail-section li::before {
      content: '\25B8';
      position: absolute;
      left: 0;
      color: #64748b;
    }

    .doc-tag {
      display: inline-block;
      background: #312e81;
      color: #a5b4fc;
      font-size: .7rem;
      padding: .15rem .5rem;
      border-radius: 4px;
      margin: .15rem .25rem .15rem 0;
    }

    .location-box {
      background: #0f172a;
      border-radius: 8px;
      padding: .6rem .75rem;
      margin-top: .4rem;
      font-size: .82rem;
    }
    .location-box .jp-term {
      color: #f97316;
      font-weight: 600;
    }
    .location-box .address-note {
      color: #64748b;
      font-size: .75rem;
      margin-top: .2rem;
    }

    .form-preview {
      background: #0f172a;
      border: 1px dashed #475569;
      border-radius: 8px;
      padding: .75rem;
      margin-top: .5rem;
      text-align: center;
    }
    .form-preview img {
      max-width: 100%;
      border-radius: 6px;
      margin-bottom: .4rem;
    }
    .form-placeholder {
      color: #64748b;
      font-size: .8rem;
    }
    .form-annotations {
      text-align: left;
      margin-top: .5rem;
    }
    .form-annotations li {
      font-size: .75rem;
      color: #94a3b8;
    }
    .form-annotations li strong {
      color: #f97316;
    }

    .phrase-table {
      width: 100%;
      font-size: .78rem;
      border-collapse: collapse;
      margin-top: .4rem;
    }
    .phrase-table td {
      padding: .25rem .4rem;
      border-bottom: 1px solid #2d3748;
    }
    .phrase-table .jp { color: #f97316; font-weight: 600; }
    .phrase-table .en { color: #94a3b8; }

    .ask-agent-btn {
      background: linear-gradient(135deg, #e11d48, #f97316);
      color: white;
      border: none;
      border-radius: 8px;
      padding: .4rem .8rem;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: transform .1s;
    }
    .ask-agent-btn:hover { transform: scale(1.03); }

    .pitfall-box {
      background: #3b1320;
      border-left: 3px solid #e11d48;
      border-radius: 0 8px 8px 0;
      padding: .5rem .75rem;
      margin-top: .5rem;
      font-size: .78rem;
      color: #fda4af;
    }

    /* === RIGHT PANEL: VOICE + TRANSCRIPT === */
    .voice-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .voice-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .75rem;
      padding: 1rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: .6rem 1.2rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    button:hover { transform: scale(1.03); }
    button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    #connectBtn {
      background: linear-gradient(135deg, #e11d48, #f97316);
      color: white;
      padding: .75rem 2rem;
      font-size: 1.05rem;
      border-radius: 999px;
    }
    #micBtn {
      background: #22c55e;
      color: white;
      border-radius: 999px;
      width: 48px; height: 48px;
      padding: 0;
      font-size: 1.2rem;
      display: none;
    }
    #micBtn.muted { background: #ef4444; }
    #disconnectBtn {
      background: #334155;
      color: #94a3b8;
      display: none;
    }

    /* Context card shown by agent/checklist */
    .context-card {
      display: none;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: .75rem 1rem;
    }
    .context-card.visible { display: block; }
    .context-card h3 { font-size: .85rem; color: #f97316; margin-bottom: .3rem; }
    .context-card p { font-size: .8rem; color: #94a3b8; line-height: 1.35; }
    .context-card img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: .5rem;
      border: 1px solid #334155;
    }

    .transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .transcript-label {
      font-size: .7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .5rem;
    }
    #transcript {
      min-height: 100px;
    }
    .msg { margin-bottom: .75rem; line-height: 1.4; }
    .msg .role {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: .1rem;
    }
    .msg.user .role { color: #60a5fa; }
    .msg.agent .role { color: #f97316; }
    .msg .text {
      background: #1e293b;
      display: inline-block;
      padding: .35rem .65rem;
      border-radius: 8px;
      font-size: .85rem;
      max-width: 95%;
    }
    .msg.user { text-align: right; }
    .msg.agent { text-align: left; }
    .empty-state {
      color: #475569;
      text-align: center;
      padding: 2rem;
      font-size: .85rem;
    }

    /* Mobile: stack vertically */
    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
      }
      .checklist-panel {
        border-right: none;
        border-bottom: 1px solid #334155;
        max-height: 45vh;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header>
    <div style="display:flex;align-items:center;gap:.75rem">
      <img src="/static/logo.png" alt="Jizo" style="height:36px;width:auto;border-radius:6px">
      <h1>Jizo 地蔵 — Japan Life Navigator</h1>
    </div>
    <div class="header-right">
      <div id="status">Ready to connect</div>
    </div>
  </header>

  <!-- LEFT: CHECKLIST -->
  <div class="checklist-panel">
    <div class="progress-bar">
      <div class="label">Registration Progress</div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 8 completed</div>
    </div>

    <div id="checklist"></div>
  </div>

  <!-- RIGHT: VOICE + TRANSCRIPT -->
  <div class="voice-panel">
    <div class="voice-controls">
      <button id="connectBtn" onclick="toggleConnection()">Start Talking</button>
      <button id="micBtn" onclick="toggleMic()" title="Toggle microphone"></button>
      <button id="disconnectBtn" onclick="disconnect()">End Call</button>
    </div>

    <div class="context-card" id="contextCard">
      <h3 id="contextTitle"></h3>
      <p id="contextBody"></p>
      <img id="contextImage" src="" alt="" style="display:none" />
    </div>

    <div class="transcript-area">
      <div class="transcript-label">Live Transcript</div>
      <div id="transcript">
        <div class="empty-state">Start a voice session or click a step to begin...</div>
      </div>
    </div>
  </div>
</div>

<!-- LiveKit SDK -->
<script src="https://unpkg.com/livekit-client@2.9.1/dist/livekit-client.umd.js"></script>

<script>
// ================================================
// CHECKLIST DATA (from knowledge/visa/first-steps-arrival.md)
// ================================================
const STEPS = [

  },

      'Major carriers: docomo, au, SoftBank. MVNOs: Y!mobile, UQ Mobile'
    ],

    phrases: [['携帯電話', 'keitai denwa', 'Mobile phone'], ['SIMカード', 'SIM kaado', 'SIM card']],

    askPrompt: 'What\'s the fastest way to get a Japanese phone number?'
  },
  {
    id: 'extras',
    title: 'Additional Setup (First Month)',
    deadline: 'Within first 30 days',
    location: { name: 'Various — city hall, train station, embassy', jp: '', note: 'Multiple locations depending on the task.' },
    documents: ['Varies by task'],
    process: [
      'Register your personal seal (inkan) at city hall if needed for contracts',
      'Get a commuter pass (teikiken) at the train station',

    ],
    form: null,
    phrases: [['印鑑登録', 'inkan touroku', 'Seal registration'], ['定期券', 'teikiken', 'Commuter pass']],

// ================================================
// STATE
// ================================================
let completedSteps = new Set();
let expandedStep = null;

// Fresh start every session — clear any saved progress
localStorage.removeItem('jln_completed');

// ================================================
// RENDER CHECKLIST
// ================================================
function renderChecklist() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  STEPS.forEach((step, idx) => {
    const isCompleted = completedSteps.has(step.id);
    const isExpanded = expandedStep === step.id;
    const isActive = !isCompleted && idx === nextIncompleteIndex();

    const card = document.createElement('div');
    card.className = `step-card${isCompleted ? ' completed' : ''}${isActive ? ' active' : ''}${isExpanded ? ' expanded' : ''}`;
    card.innerHTML = `
      <div class="step-header" onclick="toggleExpand('${step.id}')">
        <div class="step-number">${isCompleted ? '\u2713' : idx + 1}</div>
        <div class="step-info">
          <div class="step-title">${step.title}</div>
          <div class="step-deadline">${step.deadline}</div>
        </div>
        <div class="step-check" onclick="event.stopPropagation(); toggleComplete('${step.id}')">${isCompleted ? '\u2713' : ''}</div>
      </div>
      <div class="step-detail">
        ${renderStepDetail(step)}
      </div>
    `;
    container.appendChild(card);
  });

  updateProgress();
}

function renderStepDetail(step) {
  let html = '';

  // Location
  if (step.location && step.location.name) {
    html += `<div class="detail-section">
      <h4>Where to Go</h4>
      <div class="location-box">
        <div><strong>${step.location.name}</strong></div>
        ${step.location.jp ? `<div class="jp-term">${step.location.jp}</div>` : ''}
        <div class="address-note">${step.location.note}</div>
      </div>
    </div>`;
  }

  // Required documents
  if (step.documents && step.documents.length) {
    html += `<div class="detail-section">
      <h4>Required Documents</h4>
      <div>${step.documents.map(d => `<span class="doc-tag">${d}</span>`).join('')}</div>
    </div>`;
  }

  // Process steps
  if (step.process && step.process.length) {
    html += `<div class="detail-section">
      <h4>Step-by-Step Process</h4>
      <ul>${step.process.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>`;
  }

  // Form preview
  if (step.form) {
    html += `<div class="detail-section">
      <h4>Form: ${step.form.name}</h4>
      <div class="form-preview">
        ${step.form.images
          ? step.form.images.map(src => `<img src="${src}" alt="${step.form.name}" style="margin-bottom:.5rem" />`).join('')
          : step.form.pdf
            ? `<a href="${step.form.pdf}" target="_blank" style="display:inline-block;background:#312e81;color:#a5b4fc;padding:.5rem 1rem;border-radius:8px;text-decoration:none;font-size:.85rem;margin-bottom:.5rem">View / Download Form Guide (PDF)</a>`
            : `<div class="form-placeholder">Form image not yet added</div>`
        }
        <div class="form-annotations">
          <ul>${step.form.fields.map((f, i) => `<li><strong>Field ${i+1}:</strong> ${f}</li>`).join('')}</ul>
        </div>
      </div>
    </div>`;
  }

  // Extra reference images (residence card, customs forms, etc.)
  if (step.extraImages && step.extraImages.length) {
    html += `<div class="detail-section">
      <h4>Reference Images</h4>
      ${step.extraImages.map(img => `
        <div class="form-preview">
          <img src="${img.src}" alt="${img.caption}" />
          <div style="font-size:.75rem;color:#94a3b8;margin-top:.3rem">${img.caption}</div>
        </div>
      `).join('')}
    </div>`;
  }

  // Useful phrases
  if (step.phrases && step.phrases.length) {
    html += `<div class="detail-section">
      <h4>Useful Japanese Phrases</h4>
      <table class="phrase-table">
        ${step.phrases.map(([jp, rom, en]) => `<tr><td class="jp">${jp}</td><td>${rom}</td><td class="en">${en}</td></tr>`).join('')}
      </table>
    </div>`;
  }

  // Pitfall warning
  if (step.pitfall) {
    html += `<div class="pitfall-box">\u26A0 ${step.pitfall}</div>`;
  }

  // Ask agent button
  if (step.askPrompt) {
    html += `<button class="ask-agent-btn" onclick="event.stopPropagation(); askAgentAbout('${step.id}')">Ask Navigator About This Step</button>`;
  }

  return html;
}

function nextIncompleteIndex() {
  return STEPS.findIndex(s => !completedSteps.has(s.id));
}

function toggleExpand(stepId) {
  expandedStep = expandedStep === stepId ? null : stepId;
  renderChecklist();
  showContextForStep(stepId);
  // Notify agent which step the user is looking at
  if (expandedStep) {
    const step = STEPS.find(s => s.id === stepId);
    sendToAgent('step_focused', { step_id: stepId, step_title: step ? step.title : '' });
  }
}

function toggleComplete(stepId) {
  if (completedSteps.has(stepId)) {
    completedSteps.delete(stepId);
  } else {
    completedSteps.add(stepId);
  }
  localStorage.setItem('jln_completed', JSON.stringify([...completedSteps]));
  renderChecklist();
  sendToAgent('checklist_status', getChecklistPayload());
}

function updateProgress() {
  const total = STEPS.length;
  const done = completedSteps.size;
  const pct = Math.round((done / total) * 100);
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.style.opacity = pct === 0 ? '0' : '1';
  document.getElementById('progressText').textContent = `${done} / ${total} completed`;
}

function showContextForStep(stepId) {
  const step = STEPS.find(s => s.id === stepId);
  if (!step || expandedStep !== stepId) {
    document.getElementById('contextCard').classList.remove('visible');
    return;
  }
  const card = document.getElementById('contextCard');
  document.getElementById('contextTitle').textContent = `Step ${STEPS.indexOf(step) + 1}: ${step.title}`;
  document.getElementById('contextBody').textContent = step.process ? step.process[0] : '';
  document.getElementById('contextImage').style.display = 'none';
  card.classList.add('visible');
}

function askAgentAbout(stepId) {
  const step = STEPS.find(s => s.id === stepId);
  if (!step) return;

  // Show the prompt in transcript as a visual cue
  addTranscriptEntry('user', step.askPrompt);

  // If connected, send as client action so the agent gets context
  if (room && connected) {
    try {
      room.localParticipant.publishData(
        new TextEncoder().encode(JSON.stringify({
          type: 'client_action',
          action: 'checklist_query',
          payload: { step_id: step.id, step_title: step.title, query: step.askPrompt }
        })),
        { reliable: true, topic: 'client_actions' }
      );
    } catch(e) { console.error('Failed to send to agent:', e); }
  }

  // Scroll transcript to bottom
  const t = document.getElementById('transcript');
  t.scrollTop = t.scrollHeight;
}

// ================================================
// VOICE CONNECTION (same as before)
// ================================================
const { Room, RoomEvent, Track, ConnectionState } = LivekitClient;

let room = null;
let micEnabled = false;
let connected = false;

const statusEl = document.getElementById('status');
const connectBtn = document.getElementById('connectBtn');
const micBtn = document.getElementById('micBtn');
const disconnectBtn = document.getElementById('disconnectBtn');

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || '';
}

function addTranscriptEntry(role, text) {
  const transcriptEl = document.getElementById('transcript');
  const empty = transcriptEl.querySelector('.empty-state');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="role">${role === 'user' ? 'You' : 'Jizo'}</div>
    <div class="text">${escapeHtml(text)}</div>
  `;
  transcriptEl.appendChild(div);
  transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function updateMicButton() {
  micBtn.textContent = micEnabled ? '\u{1F3A4}' : '\u{1F507}';
  micBtn.className = micEnabled ? '' : 'muted';
}

async function toggleConnection() {
  if (connected) return;
  try {
    setStatus('Connecting...', 'connecting');
    connectBtn.disabled = true;

    const resp = await fetch('/api/voice-token');
    if (!resp.ok) throw new Error((await resp.json()).error || 'Token failed');
    const { livekit_url, token } = await resp.json();

    room = new Room();

    room.on(RoomEvent.TrackSubscribed, (track) => {
      if (track.kind === Track.Kind.Audio) {
        const el = track.attach();
        el.id = 'agent-audio';
        document.body.appendChild(el);
      }
    });
    room.on(RoomEvent.TrackUnsubscribed, (track) => {
      track.detach().forEach(el => el.remove());
    });

    room.on(RoomEvent.DataReceived, (payload, participant, kind, topic) => {
      if (topic !== 'client_actions') return;
      try {
        const data = JSON.parse(new TextDecoder().decode(payload));
        if (data.type !== 'client_action') return;

        switch (data.action) {
          case 'send_transcript':
            addTranscriptEntry(data.payload.role, data.payload.text);
            break;

          case 'heartbeat':
            room.localParticipant.publishData(
              new TextEncoder().encode(JSON.stringify({
                type: 'client_action', action: 'heartbeat_ack',
                payload: { timestamp: data.payload.timestamp }
              })),
              { reliable: true, topic: 'client_actions' }
            );
            break;

          // === AGENT-TO-APP: Update checklist ===
          case 'update_checklist':
            if (data.payload && data.payload.step_id) {
              const stepId = data.payload.step_id;
              const completed = data.payload.completed !== false;
              if (completed) {
                completedSteps.add(stepId);
              } else {
                completedSteps.delete(stepId);
              }
              localStorage.setItem('jln_completed', JSON.stringify([...completedSteps]));
              renderChecklist();
              console.log(`[Jizo] Checklist updated: ${stepId} → ${completed ? 'done' : 'pending'}`);
            }
            break;

          // === AGENT-TO-APP: Highlight/expand a step ===
          case 'highlight_step':
            if (data.payload && data.payload.step_id) {
              expandedStep = data.payload.step_id;
              renderChecklist();
              showContextForStep(data.payload.step_id);
              // Scroll the step into view in the checklist panel
              const el = document.querySelector(`.step-card.expanded`);
              if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              console.log(`[Jizo] Highlighted step: ${data.payload.step_id}`);
            }
            break;

          default:
            console.log('[Jizo] Unknown action:', data.action, data.payload);
        }
      } catch(e) {}
    });

    room.on(RoomEvent.ConnectionStateChanged, (state) => {
      if (state === ConnectionState.Disconnected) handleDisconnect();
    });

    await room.connect(livekit_url, token);
    await navigator.mediaDevices.getUserMedia({ audio: true });
    await room.localParticipant.setMicrophoneEnabled(true);
    micEnabled = true;
    connected = true;

    setStatus('Connected', 'connected');

    // Send initial checklist status to agent so it knows where the user is
    sendToAgent('checklist_status', getChecklistPayload());
    connectBtn.style.display = 'none';
    micBtn.style.display = 'inline-flex';
    disconnectBtn.style.display = 'inline-flex';
    updateMicButton();
  } catch (err) {
    setStatus('Error: ' + err.message, 'error');
    connectBtn.disabled = false;
  }
}

async function toggleMic() {
  if (!room) return;
  micEnabled = !micEnabled;
  await room.localParticipant.setMicrophoneEnabled(micEnabled);
  updateMicButton();
  setStatus(micEnabled ? 'Connected' : 'Muted', micEnabled ? 'connected' : '');
}

async function disconnect() {
  if (room) await room.disconnect();
  handleDisconnect();
}

function handleDisconnect() {
  connected = false; micEnabled = false; room = null;
  const el = document.getElementById('agent-audio');
  if (el) el.remove();
  setStatus('Disconnected', '');
  connectBtn.style.display = 'inline-flex';
  connectBtn.disabled = false;
  micBtn.style.display = 'none';
  disconnectBtn.style.display = 'none';
}

// ================================================
// CLIENT ACTIONS: App → Agent
// ================================================
function sendToAgent(action, payload = {}) {
  if (!room || !connected) return;
  try {
    room.localParticipant.publishData(
      new TextEncoder().encode(JSON.stringify({
        type: 'client_action',
        action: action,
        payload: payload
      })),
      { reliable: true, topic: 'client_actions' }
    );
  } catch(e) { console.error('sendToAgent failed:', e); }
}

function getChecklistPayload() {
  const completed = [...completedSteps];
  const pending = STEPS.filter(s => !completedSteps.has(s.id)).map(s => s.id);
  const nextStep = STEPS.find(s => !completedSteps.has(s.id));
  return {
    completed,
    pending,
    next_step: nextStep ? { id: nextStep.id, title: nextStep.title } : null,
    total: STEPS.length,
    done: completed.length
  };
}

// ================================================
// INIT
// ================================================
renderChecklist();
</script>
